<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MemoryFS</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --err: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    .toolbar { display: flex; gap: 0.5rem; align-items: center; }
    input, button {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.7rem;
      border-radius: 6px;
      font-size: 0.875rem;
    }
    input { width: 140px; }
    button { cursor: pointer; background: var(--accent); border-color: var(--accent); }
    button.secondary { background: var(--card); border-color: var(--border); }
    button.danger { background: #7f1d1d; border-color: #991b1b; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem;
    }
    .card label { display: block; color: var(--muted); font-size: 0.7rem; }
    .card .val { font-size: 1.2rem; font-weight: 600; margin-top: 0.25rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    th, td { text-align: left; padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      font-size: 0.7rem;
    }
    .badge.leader { background: #1e3a5f; color: #93c5fd; }
    .badge.follower { background: #374151; color: #d1d5db; }
    .badge.active { background: #14532d; color: #86efac; }
    .badge.draining { background: #713f12; color: #fcd34d; }
    .badge.drained { background: #450a0a; color: #fca5a5; }
    .badge.down { background: #450a0a; color: #fca5a5; }
    #status { color: var(--muted); font-size: 0.75rem; margin-top: 0.75rem; }
    .actions button { padding: 0.2rem 0.45rem; font-size: 0.7rem; margin-right: 0.25rem; }
  </style>
</head>
<body>
  <header>
    <h1>MemoryFS</h1>
    <div class="toolbar">
      <input id="token" type="password" placeholder="Token" title="写操作 API Token" />
      <button class="secondary" onclick="refresh()">刷新</button>
    </div>
  </header>

  <div class="grid" id="summary"></div>

  <table>
    <thead>
      <tr>
        <th>节点</th><th>角色</th><th>状态</th><th>Chunks</th><th>内存</th><th>磁盘</th><th>操作</th>
      </tr>
    </thead>
    <tbody id="node-rows"></tbody>
  </table>

  <p id="status"></p>

  <script>
    const URI_PREFIX = '__MEMORYFS_URI_PREFIX__';
    const path = p => (URI_PREFIX + p).replace(/\/{2,}/g, '/');

    const fmtBytes = n => {
      if (!n) return '0 B';
      const u = ['B','KB','MB','GB','TB'];
      let i = 0; while (n >= 1024 && i < u.length-1) { n/=1024; i++; }
      return n.toFixed(1) + ' ' + u[i];
    };

    function headers() {
      const h = {'Content-Type':'application/json'};
      const t = document.getElementById('token').value.trim();
      if (t) h['Authorization'] = 'Bearer ' + t;
      return h;
    }

    async function api(p, method='GET', body) {
      const opt = {method, headers: headers()};
      if (body) opt.body = JSON.stringify(body);
      const r = await fetch(path(p), opt);
      if (!r.ok) throw new Error(await r.text() || r.statusText);
      return r.json();
    }

    function badge(cls, text) { return `<span class="badge ${cls}">${text}</span>`; }

    async function refresh() {
      const st = document.getElementById('status');
      st.textContent = '刷新中...';
      try {
        const data = await api('/v1/cluster/overview');
        const ov = data.overview || data;
        renderSummary(ov);
        renderNodes(ov.nodes || []);
        st.textContent = '更新于 ' + new Date().toLocaleTimeString();
      } catch (e) {
        st.textContent = '错误: ' + e.message;
      }
    }

    function renderSummary(ov) {
      const el = document.getElementById('summary');
      const storage = ov.storage || {};
      const cards = [
        ['Leader', (ov.leader || '-').replace(/^https?:\/\//, '')],
        ['Epoch', ov.cluster_epoch ?? '-'],
        ['RF', ov.replica_factor ?? '-'],
        ['节点', `${storage.reachable_nodes ?? 0}/${storage.total_nodes ?? (ov.nodes||[]).length}`],
        ['集群配额', fmtBytes(storage.total_disk_quota_bytes || 0)],
        ['集群已用', fmtBytes((storage.total_disk_bytes || 0) + (storage.total_mem_bytes || 0))],
        ['修复', ov.repair?.pending ?? 0],
      ];
      el.innerHTML = cards.map(([l,v]) =>
        `<div class="card"><label>${l}</label><div class="val">${v}</div></div>`
      ).join('');
    }

    function renderNodes(nodes) {
      document.getElementById('node-rows').innerHTML = nodes.map(n => {
        const role = n.reachable ? badge(n.role||'follower', n.role||'?') : badge('down','不可达');
        const state = n.reachable ? badge(n.node_state||'active', n.node_state||'?') : badge('down','-');
        const stats = n.stats || {};
        return `<tr>
          <td><code>${(n.url||'-').replace(/^https?:\/\//, '')}</code></td>
          <td>${role}</td>
          <td>${state}</td>
          <td>${stats.chunk_count??'-'}</td>
          <td>${fmtBytes(stats.mem_bytes)}</td>
          <td>${fmtBytes(stats.disk_bytes)}</td>
          <td class="actions">
            <button class="secondary" onclick="nodeAction('${n.url}','/v1/lifecycle/ready')">Ready</button>
            <button class="danger" onclick="nodeAction('${n.url}','/v1/lifecycle/drain')">Drain</button>
          </td>
        </tr>`;
      }).join('');
    }

    async function nodeAction(base, p) {
      try {
        const t = document.getElementById('token').value.trim();
        const h = {'Content-Type':'application/json'};
        if (t) h['Authorization'] = 'Bearer ' + t;
        await fetch(base.replace(/\/$/,'') + p, {method:'POST', headers:h, body:'{}'});
        refresh();
      } catch (e) { alert(e.message); }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
