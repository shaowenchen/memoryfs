name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        run: |
          curl -sL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip"
          unzip -q /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> $GITHUB_PATH
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate proto
        run: make proto

      - name: Build
        run: make build

      - name: Test
        run: go test -race -count=1 ./...

  release:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint and package chart
        run: |
          helm lint deploy/helm/memoryfs
          mkdir -p dist
          helm package deploy/helm/memoryfs \
            --version "${{ steps.meta.outputs.version }}" \
            --app-version "${{ steps.meta.outputs.tag }}" \
            --destination dist
          ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MemoryFS ${{ steps.meta.outputs.tag }}
          files: dist/*.tgz
          generate_release_notes: true

  docker:
    name: Build and push versioned image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: meta
        run: echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: https://registry.cn-beijing.aliyuncs.com
          username: "${{ secrets.ACR_USERNAME }}"
          password: "${{ secrets.ACR_PASSWORD }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push memoryfs
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/shaowenchen/memoryfs:${{ steps.meta.outputs.tag }}
          file: Dockerfile

      - name: Push memoryfs to aliyun
        run: |
          export image=memoryfs:${{ steps.meta.outputs.tag }}
          docker run --rm -v ~/.docker/config.json:/auth.json quay.io/skopeo/stable copy \
            docker://shaowenchen/${image} \
            docker://registry.cn-beijing.aliyuncs.com/opshub/shaowenchen-${image} \
            --dest-authfile /auth.json --insecure-policy \
            --src-tls-verify=false --dest-tls-verify=false --retry-times 5 --all
