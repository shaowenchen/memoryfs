name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        run: |
          curl -sL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip"
          unzip -q /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> $GITHUB_PATH
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate proto
        run: make proto

      - name: Build
        run: make build

      - name: Test
        run: go test -race -count=1 ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  docker:
    name: Build and push latest image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push memoryfs
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          push: true
          tags: docker.io/shaowenchen/memoryfs:latest
          file: Dockerfile

      - name: Login to ACR
        if: ${{ secrets.ACR_REGISTRY != '' && secrets.ACR_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          registry: https://${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push memoryfs to ACR
        if: ${{ secrets.ACR_REGISTRY != '' && secrets.ACR_REPOSITORY != '' }}
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}
        run: |
          docker run --rm -v ~/.docker/config.json:/auth.json quay.io/skopeo/stable copy \
            docker://shaowenchen/memoryfs:latest \
            docker://${ACR_REGISTRY}/${ACR_REPOSITORY}:latest \
            --dest-authfile /auth.json --insecure-policy \
            --src-tls-verify=false --dest-tls-verify=false --retry-times 5

  helm-release:
    name: Publish Helm chart (latest)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package and upload chart
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          helm lint deploy/helm/memoryfs
          mkdir -p dist
          helm package deploy/helm/memoryfs \
            --version 0.0.0 \
            --app-version latest \
            --destination dist
          mv dist/memoryfs-0.0.0.tgz dist/memoryfs-latest.tar.gz
          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes --cleanup-tag
          fi
          gh release create latest dist/memoryfs-latest.tar.gz \
            --title latest \
            --notes "MemoryFS Helm chart (latest)" \
            --target "${{ github.sha }}"
