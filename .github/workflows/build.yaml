name: Build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/amd64,linux/arm64"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        run: |
          curl -sL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip"
          unzip -q /tmp/protoc.zip -d /tmp/protoc
          echo "/tmp/protoc/bin" >> $GITHUB_PATH
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate proto
        run: make proto

      - name: Build
        run: make build

      - name: Test
        run: go test -race -count=1 ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  build:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: https://registry.cn-beijing.aliyuncs.com
          username: "${{ secrets.ACR_USERNAME }}"
          password: "${{ secrets.ACR_PASSWORD }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push memoryfs
        uses: docker/build-push-action@v6
        with:
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: true
          tags: docker.io/shaowenchen/memoryfs:latest
          file: Dockerfile

      - name: Push memoryfs to aliyun
        run: |
          export image=memoryfs:latest
          docker run --rm -v ~/.docker/config.json:/auth.json quay.io/skopeo/stable copy \
            docker://shaowenchen/${image} \
            docker://registry.cn-beijing.aliyuncs.com/opshub/shaowenchen-${image} \
            --dest-authfile /auth.json --insecure-policy \
            --src-tls-verify=false --dest-tls-verify=false --retry-times 5 --all
