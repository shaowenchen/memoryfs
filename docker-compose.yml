services:
  node1:
    image: shaowenchen/memoryfs:latest
    build: .
    command:
      - node
      - -bootstrap
      - -id
      - n1
      - -http
      - :8080
      - -grpc
      - :9090
      - -raft
      - :8081
      - -data
      - /data
      - -chunk-dir
      - /data/chunks
      - -replica-factor
      - "2"
    ports:
      - "8080:8080"
      - "9090:9090"
      - "8081:8081"
    volumes:
      - node1-data:/data

  node2:
    image: shaowenchen/memoryfs:latest
    command:
      - node
      - -id
      - n2
      - -http
      - :8090
      - -grpc
      - :9190
      - -raft
      - :8091
      - -data
      - /data
      - -chunk-dir
      - /data/chunks
      - -replica-factor
      - "2"
      - -join
      - http://node1:8080
    ports:
      - "8090:8090"
      - "9190:9190"
      - "8091:8091"
    volumes:
      - node2-data:/data
    depends_on:
      - node1

  # FUSE mount requires Linux privileged mode and /dev/fuse
  mount:
    image: shaowenchen/memoryfs:latest
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    command:
      - mount
      - -mount
      - /mnt/memoryfs
      - -nodes
      - http://node1:8080,http://node2:8090
      - -replica-factor
      - "2"
      - -f
    volumes:
      - ./mnt:/mnt/memoryfs
    depends_on:
      - node1
      - node2

volumes:
  node1-data:
  node2-data:
