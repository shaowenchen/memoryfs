services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker1:
    build: .
    command: ["/app/worker", "-addr", ":8080", "-redis", "redis:6379"]
    ports:
      - "8080:8080"
    depends_on:
      - redis

  worker2:
    build: .
    command: ["/app/worker", "-addr", ":8081", "-redis", "redis:6379"]
    ports:
      - "8081:8081"
    depends_on:
      - redis
