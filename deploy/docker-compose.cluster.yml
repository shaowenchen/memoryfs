# MemoryFS production cluster (3 nodes)
# Usage: docker compose -f deploy/docker-compose.cluster.yml up -d

name: memoryfs

x-node-common: &node-common
  image: ${MEMORYFS_IMAGE:-shaowenchen/memoryfs:latest}
  restart: unless-stopped
  networks:
    - memoryfs
  environment: &node-env
    MEMORYFS_DATA: /data
    MEMORYFS_CHUNK_BACKEND: ${MEMORYFS_CHUNK_BACKEND:-tiered}
    MEMORYFS_REPLICA_FACTOR: "${MEMORYFS_REPLICA_FACTOR:-2}"
    MEMORYFS_MEM_CACHE_MB: "${MEMORYFS_MEM_CACHE_MB:-512}"
    MEMORYFS_DISK_QUOTA_GB: "${MEMORYFS_DISK_QUOTA_GB:-0}"
    MEMORYFS_GC_INTERVAL: ${MEMORYFS_GC_INTERVAL:-5m}
    MEMORYFS_DEFAULT_TTL: ${MEMORYFS_DEFAULT_TTL:-0}
    MEMORYFS_MAX_FILE_AGE: ${MEMORYFS_MAX_FILE_AGE:-0}
  healthcheck:
    test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 20s

services:
  n1:
    <<: *node-common
    hostname: n1
    command: ["node-env"]
    environment:
      <<: *node-env
      MEMORYFS_ID: n1
      MEMORYFS_BOOTSTRAP: "true"
      MEMORYFS_HTTP_URL: http://n1:8080
      MEMORYFS_RAFT_URL: n1:8081
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - n1-data:/data

  n2:
    <<: *node-common
    hostname: n2
    command: ["node-env"]
    environment:
      <<: *node-env
      MEMORYFS_ID: n2
      MEMORYFS_JOIN: http://n1:8080
      MEMORYFS_HTTP_URL: http://n2:8080
      MEMORYFS_RAFT_URL: n2:8081
    ports:
      - "8090:8080"
      - "9190:9090"
    volumes:
      - n2-data:/data
    depends_on:
      n1:
        condition: service_healthy

  n3:
    <<: *node-common
    hostname: n3
    command: ["node-env"]
    environment:
      <<: *node-env
      MEMORYFS_ID: n3
      MEMORYFS_JOIN: http://n1:8080
      MEMORYFS_HTTP_URL: http://n3:8080
      MEMORYFS_RAFT_URL: n3:8081
    ports:
      - "8190:8080"
      - "9290:9090"
    volumes:
      - n3-data:/data
    depends_on:
      n1:
        condition: service_healthy

  mount:
    image: ${MEMORYFS_IMAGE:-shaowenchen/memoryfs:latest}
    privileged: true
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
    networks:
      - memoryfs
    command:
      - mount
      - -mount
      - /mnt/memoryfs
      - -nodes
      - http://n1:8080,http://n2:8080,http://n3:8080
      - -replica-factor
      - "${MEMORYFS_REPLICA_FACTOR:-2}"
      - -f
    volumes:
      - ./mnt:/mnt/memoryfs
    depends_on:
      n1:
        condition: service_healthy
      n2:
        condition: service_healthy
      n3:
        condition: service_healthy

networks:
  memoryfs:
    driver: bridge

volumes:
  n1-data:
  n2-data:
  n3-data:
