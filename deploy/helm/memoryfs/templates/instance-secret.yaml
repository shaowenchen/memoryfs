{{- if eq .Values.node.storage.type "hostPath" }}
{{- $secretName := printf "%s-instance" (include "memoryfs.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $instanceId := "" }}
{{- if .Values.node.storage.instanceId }}
{{- $instanceId = .Values.node.storage.instanceId | toString }}
{{- else if and $existing (index $existing.data "id") }}
{{- $instanceId = index $existing.data "id" | b64dec }}
{{- else }}
{{- $instanceId = randNumeric 8 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "memoryfs.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  id: {{ $instanceId | quote }}
{{- end }}
