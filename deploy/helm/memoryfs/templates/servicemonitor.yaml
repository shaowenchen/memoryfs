{{- if .Values.metrics.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "memoryfs.fullname" . }}
  labels:
    {{- include "memoryfs.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "memoryfs.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.interval }}
{{- end }}
