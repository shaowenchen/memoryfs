{{- if .Values.dashboard.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "memoryfs.fullname" . }}
  labels:
    {{- include "memoryfs.labels" . | nindent 4 }}
  {{- with .Values.dashboard.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.dashboard.ingress.className }}
  ingressClassName: {{ .Values.dashboard.ingress.className | quote }}
  {{- end }}
  {{- if .Values.dashboard.ingress.tls }}
  tls:
    {{- toYaml .Values.dashboard.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - {{- if .Values.dashboard.ingress.host }}
      host: {{ .Values.dashboard.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          - path: {{ .Values.dashboard.ingress.path | default .Values.dashboard.uriPrefix | default "/memoryfs" | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "memoryfs.fullname" . }}
                port:
                  number: {{ .Values.service.httpPort }}
{{- end }}
