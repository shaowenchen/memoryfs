apiVersion: v1
kind: Service
metadata:
  name: {{ include "memoryfs.headless" . }}
  labels:
    {{- include "memoryfs.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "memoryfs.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
    - name: raft
      port: {{ .Values.service.raftPort }}
      targetPort: raft
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memoryfs.fullname" . }}
  labels:
    {{- include "memoryfs.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "memoryfs.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
