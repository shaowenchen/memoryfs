apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "memoryfs.fullname" . }}
  labels:
    {{- include "memoryfs.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "memoryfs.headless" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.node.podManagementPolicy }}
  updateStrategy:
    type: {{ .Values.node.updateStrategy }}
  selector:
    matchLabels:
      {{- include "memoryfs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "memoryfs.selectorLabels" . | nindent 8 }}
        memoryfs.io/role: node
    spec:
      hostNetwork: {{ .Values.hostNetwork }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      serviceAccountName: {{ include "memoryfs.serviceAccountName" . }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- include "memoryfs.spreadAffinity" . | nindent 8 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              ORD="${HOSTNAME##*-}"
              if [ "$ORD" = "0" ]; then exit 0; fi
              BOOT0="http://{{ include "memoryfs.fullname" . }}-0.{{ include "memoryfs.headless" . }}:{{ .Values.service.httpPort }}"
              echo "waiting for ${BOOT0}/health ..."
              until curl -sf "${BOOT0}/health" >/dev/null; do sleep 2; done
              echo "memoryfs-0 is ready"
      containers:
        - name: node
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{ include "memoryfs.bootstrapJoinScript" . | nindent 14 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
            - name: raft
              containerPort: {{ .Values.service.raftPort }}
            - name: rdma
              containerPort: {{ .Values.service.rdmaPort }}
          env:
            - name: MEMORYFS_HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if eq .Values.node.storage.type "hostPath" }}
            - name: MEMORYFS_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "memoryfs.instanceSecretName" . }}
                  key: id
            - name: MEMORYFS_STORAGE_ROOT
              value: {{ .Values.node.storage.hostPath | quote }}
            {{- else }}
            - name: MEMORYFS_DATA
              value: {{ .Values.node.dataDir | quote }}
            - name: MEMORYFS_CHUNK_DIR
              value: {{ .Values.node.chunkDir | quote }}
            {{- end }}
            - name: MEMORYFS_CHUNK_BACKEND
              value: {{ include "memoryfs.chunkBackend" . | quote }}
            - name: MEMORYFS_REPLICA_FACTOR
              value: {{ .Values.replicaFactor | quote }}
            - name: MEMORYFS_MEM_CACHE_MB
              value: "0"
            - name: MEMORYFS_DISK_QUOTA_GB
              value: {{ include "memoryfs.diskQuotaGB" . | quote }}
            - name: MEMORYFS_GC_INTERVAL
              value: {{ .Values.node.gcInterval | quote }}
            - name: MEMORYFS_FLUSH_INTERVAL
              value: {{ include "memoryfs.flushInterval" . | quote }}
            - name: MEMORYFS_DEFAULT_TTL
              value: {{ .Values.node.defaultTTL | quote }}
            - name: MEMORYFS_MAX_FILE_AGE
              value: {{ .Values.node.maxFileAge | quote }}
            - name: MEMORYFS_HEADLESS_SERVICE
              value: {{ include "memoryfs.headless" . }}
            - name: MEMORYFS_HTTP_LISTEN
              value: ":{{ .Values.service.httpPort }}"
            - name: MEMORYFS_GRPC_LISTEN
              value: ":{{ .Values.service.grpcPort }}"
            - name: MEMORYFS_RDMA_LISTEN
              value: ":{{ .Values.service.rdmaPort }}"
            - name: MEMORYFS_RAFT_LISTEN
              value: ":{{ .Values.service.raftPort }}"
            {{- if .Values.apiToken }}
            - name: MEMORYFS_API_TOKEN
              value: {{ .Values.apiToken | quote }}
            {{- end }}
            {{- if .Values.dashboard.uriPrefix }}
            - name: MEMORYFS_URI_PREFIX
              value: {{ .Values.dashboard.uriPrefix | quote }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          {{- with include "memoryfs.nodeSecurityContext" . }}
          securityContext:
            {{- . | nindent 12 }}
          {{- end }}
          resources:
            requests:
              cpu: {{ .Values.node.resources.requests.cpu }}
              memory: {{ include "memoryfs.podMemory" . }}
            limits:
              cpu: {{ .Values.node.resources.limits.cpu }}
              memory: {{ include "memoryfs.podMemory" . }}
          {{- if .Values.node.lifecycle.preStopDrain }}
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    curl -sf -X POST http://127.0.0.1:{{ .Values.service.httpPort }}/v1/lifecycle/drain || true
                    sleep 10
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ if eq .Values.node.storage.type "hostPath" }}{{ .Values.node.storage.hostPath }}{{ else }}{{ .Values.node.dataDir }}{{ end }}
            {{- include "memoryfs.rdmaVolumeMounts" . | nindent 12 }}
      volumes:
        - name: data
          {{- if eq .Values.node.storage.type "hostPath" }}
          hostPath:
            path: {{ .Values.node.storage.hostPath }}
            type: {{ .Values.node.storage.hostPathType }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- include "memoryfs.rdmaVolumes" . | nindent 8 }}
