# Default values for MemoryFS Helm chart.
# User-facing knobs: replicaCount, replicaFactor, node.storageGB.

# Use host network (required for RDMA; one pod per node via anti-affinity).
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

replicaCount: 3

image:
  repository: shaowenchen/memoryfs
  tag: latest
  # imagePullPolicy is fixed to Always in templates (see statefulset.yaml).

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# Chunk replication across nodes.
replicaFactor: 2

node:
  # Empty = auto from diskSync: memory (off) / buffered (on)
  chunkBackend: ""
  # Max chunk data per pod (GB). Pod memory request/limit = storageGB + 1Gi.
  storageGB: 3
  gcInterval: 5m
  # Periodic chunk flush/fsync to node.dataDir (emptyDir or hostPath).
  diskSync:
    enabled: false
    interval: 30s
  defaultTTL: "0"
  maxFileAge: "0"
  dataDir: /data
  chunkDir: /data/chunks

  resources:
    requests:
      cpu: 500m
    limits:
      cpu: "2"

  # emptyDir = ephemeral; hostPath = /data/memoryfs/{instanceId}/{podName} on the node
  storage:
    type: hostPath
    hostPath: /data/memoryfs
    # Empty = random 8-char [a-z0-9] ID on first install (stored in Secret, stable across upgrades)
    instanceId: ""
    hostPathType: DirectoryOrCreate

  podManagementPolicy: OrderedReady # pod-N+1 starts only after pod-N is Ready
  updateStrategy: RollingUpdate

  # Lifecycle hooks for safe rolling updates.
  lifecycle:
    preStopDrain: true
    postStartReady: false

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  # RDMA chunk transport (image must be built with -tags rdma; see deploy/README.md).
  rdma:
    enabled: false

mount:
  enabled: false
  mountPath: /data/memoryfs
  hostPath: /data/memoryfs

metrics:
  enabled: false
  interval: 30s

dashboard:
  uriPrefix: /memoryfs

apiToken: ""

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090
  raftPort: 8081
  rdmaPort: 9092

nodeSelector:
  memoryfs.io/node: "true"

tolerations: []
