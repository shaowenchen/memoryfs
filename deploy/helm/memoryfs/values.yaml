# Default values for MemoryFS Helm chart.

replicaCount: 3

image:
  repository: shaowenchen/memoryfs
  tag: ""
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# Chunk replication across nodes.
replicaFactor: 2

node:
  # Empty = auto from diskSync: memory (off) / buffered (on)
  chunkBackend: ""
  memCacheMB: 512
  diskQuotaGB: 0
  gcInterval: 5m
  # Periodic chunk flush/fsync to node.dataDir (emptyDir or hostPath).
  diskSync:
    enabled: false
    interval: 30s
  defaultTTL: "0"
  maxFileAge: "0"
  dataDir: /data
  chunkDir: /data/chunks

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  # emptyDir = ephemeral; hostPath = /data/memoryfs/{instanceId}/{podName} on the node
  storage:
    type: hostPath
    hostPath: /data/memoryfs
    # Empty = random 8-char [a-z0-9] ID on first install (stored in Secret, stable across upgrades)
    instanceId: ""
    hostPathType: DirectoryOrCreate

  podManagementPolicy: OrderedReady # pod-N+1 starts only after pod-N is Ready
  updateStrategy: RollingUpdate

  # Lifecycle hooks for safe rolling updates.
  lifecycle:
    preStopDrain: true
    postStartReady: false

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

mount:
  enabled: false
  mountPath: /mnt/memoryfs
  hostPath: /var/lib/memoryfs
  replicaFactor: 2

metrics:
  enabled: false
  interval: 30s

dashboard:
  uriPrefix: /memoryfs

apiToken: ""

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090
  raftPort: 8081

nodeSelector: {}
tolerations: []
affinity: {}
