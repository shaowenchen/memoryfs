# Default values for MemoryFS Helm chart.
# Dev/test: memory backend, no periodic disk sync. Enable node.diskSync for flush-to-disk.

replicaCount: 3

image:
  repository: shaowenchen/memoryfs
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

# Chunk replication across nodes.
replicaFactor: 2

node:
  # Auto when empty: memory (diskSync off) / buffered (diskSync on)
  chunkBackend: ""
  memCacheMB: 512
  diskQuotaGB: 0
  gcInterval: 5m
  # Periodic chunk flush/fsync to local disk (emptyDir or PVC mount).
  diskSync:
    enabled: false
    interval: 30s
  defaultTTL: "0"
  maxFileAge: "0"
  dataDir: /data
  chunkDir: /data/chunks

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

  persistence:
    enabled: false
    storageClass: ""
    size: 100Gi
    accessModes:
      - ReadWriteOnce
  # Optional PVC for raft/chunk paths across Pod reschedule (independent of diskSync).

  podManagementPolicy: OrderedReady
  updateStrategy: RollingUpdate

  # Lifecycle hooks for safe rolling updates.
  lifecycle:
    preStopDrain: true
    postStartReady: true

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

mount:
  enabled: false
  mountPath: /mnt/memoryfs
  hostPath: /var/lib/memoryfs
  replicaFactor: 2

metrics:
  enabled: false
  interval: 30s

dashboard:
  uriPrefix: /memoryfs

apiToken: ""

service:
  type: ClusterIP
  httpPort: 8080
  grpcPort: 9090
  raftPort: 8081

nodeSelector: {}
tolerations: []
affinity: {}
